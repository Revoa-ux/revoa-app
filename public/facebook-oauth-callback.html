<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facebook OAuth - Revoa</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 48px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 500px;
      width: 100%;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #f3f4f6;
      border-top: 4px solid #E11D48;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .success-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #E11D48 40%, #EC4899 80%, #E8795A 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
    }

    .error-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: #ef4444;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 12px;
    }

    p {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.6;
    }

    .error-message {
      background: #fee2e2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 12px;
      margin-top: 16px;
      color: #991b1b;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading-state">
      <div class="spinner"></div>
      <h1>Connecting to Facebook</h1>
      <p>Please wait while we complete the setup...</p>
    </div>

    <div id="success-state" style="display: none;">
      <div class="success-icon">✓</div>
      <h1>Connection Complete!</h1>
      <p id="success-message">Your Facebook Ads account has been connected successfully.</p>
    </div>

    <div id="error-state" style="display: none;">
      <div class="error-icon">✕</div>
      <h1>Connection Failed</h1>
      <p id="error-text">Something went wrong. Please try again.</p>
      <div id="error-details" class="error-message" style="display: none;"></div>
    </div>
  </div>

  <script>
    function showSuccess(accountCount, accountIds) {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('success-state').style.display = 'block';

      if (accountCount) {
        const plural = accountCount === 1 ? 'account' : 'accounts';
        document.getElementById('success-message').textContent =
          `Successfully connected ${accountCount} Facebook ad ${plural}.`;
      }

      // Notify parent window
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({
          type: 'facebook-oauth-success',
          accountCount: accountCount,
          accountIds: accountIds
        }, '*');

        // Also set localStorage as fallback
        localStorage.setItem('facebook_oauth_success', JSON.stringify({
          accountCount: accountCount,
          accountIds: accountIds,
          timestamp: Date.now()
        }));
      }

      // Close window after delay
      setTimeout(() => {
        window.close();
      }, 1500);
    }

    function showError(message, details) {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('error-state').style.display = 'block';
      document.getElementById('error-text').textContent = message || 'An unexpected error occurred.';

      if (details) {
        const errorDetails = document.getElementById('error-details');
        errorDetails.textContent = details;
        errorDetails.style.display = 'block';
      }

      // Notify parent window
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({
          type: 'facebook-oauth-error',
          error: message
        }, '*');

        // Also set localStorage as fallback
        localStorage.setItem('facebook_oauth_error', JSON.stringify({
          error: message,
          timestamp: Date.now()
        }));
      }

      // Close window after delay
      setTimeout(() => {
        window.close();
      }, 5000);
    }

    // Parse URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const success = urlParams.get('facebook_connected') === 'true';
    const accountCount = parseInt(urlParams.get('accounts') || '0');
    const accountIdsParam = urlParams.get('account_ids');
    const accountIds = accountIdsParam ? accountIdsParam.split(',') : [];
    const error = urlParams.get('error');

    if (success) {
      showSuccess(accountCount, accountIds);
    } else if (error) {
      const errorMessages = {
        'invalid_session': 'Session expired. Please try again.',
        'session_expired': 'Session expired. Please try again.',
        'token_exchange_failed': 'Failed to exchange authorization code.',
        'no_ad_accounts_access': 'Could not access any ad accounts. Please ensure you have the necessary permissions.',
        'oauth_error': 'An error occurred during authorization.'
      };

      showError(errorMessages[error] || decodeURIComponent(error));
    } else {
      showError('Invalid callback. Please try connecting again.');
    }
  </script>
</body>
</html>
