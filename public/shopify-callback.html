<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecting to Shopify...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #fafafa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    .container {
      background: white;
      padding: 48px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 500px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #f3f4f6;
      border-top: 4px solid #E11D48;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .success-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #E11D48 40%, #EC4899 80%, #E8795A 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
    }

    .error-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: #ef4444;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 12px;
    }

    p {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.6;
    }

    .error-message {
      background: #fee2e2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 12px;
      margin-top: 16px;
      color: #991b1b;
      font-size: 13px;
    }

    .debug-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111;
      color: #0f0;
      padding: 12px;
      font-family: monospace;
      font-size: 11px;
      max-height: 200px;
      overflow-y: auto;
      border-top: 2px solid #0f0;
      z-index: 9999;
    }

    .debug-panel div {
      margin-bottom: 4px;
    }

    .debug-error {
      color: #f00;
    }

    .debug-success {
      color: #0f0;
    }
  </style>
</head>
<body>
  <div id="debug-panel" class="debug-panel"></div>

  <div class="container">
    <div id="loading-state">
      <div class="spinner"></div>
      <h1>Connecting to Shopify</h1>
      <p>Please wait while we complete the setup...</p>
      <p style="margin-top: 12px; font-size: 12px;">Check the debug panel at the bottom for details</p>
    </div>

    <div id="success-state" style="display: none;">
      <div class="success-icon">✓</div>
      <h1>Installation Complete!</h1>
      <p>Your Shopify store has been connected successfully.</p>
    </div>

    <div id="error-state" style="display: none;">
      <div class="error-icon">✕</div>
      <h1>Connection Failed</h1>
      <p id="error-text">Something went wrong. Please try again.</p>
      <div id="error-details" class="error-message" style="display: none;"></div>
    </div>
  </div>

  <script type="module">
    function debugLog(message, isError = false) {
      const panel = document.getElementById('debug-panel');
      const div = document.createElement('div');
      div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      div.className = isError ? 'debug-error' : 'debug-success';
      panel.appendChild(div);
      panel.scrollTop = panel.scrollHeight;
      console.log(message);
    }

    async function handleCallback() {
      try {
        debugLog('=== SHOPIFY CALLBACK STARTED ===');
        debugLog('URL: ' + window.location.href);

        const params = new URLSearchParams(window.location.search);
        const shop = params.get('shop');
        const code = params.get('code');
        const state = params.get('state');
        const hmac = params.get('hmac');

        debugLog(`Params - shop:${shop}, code:${code?'YES':'NO'}, state:${state}, hmac:${hmac?'YES':'NO'}`);

        // Check if we have required parameters
        if (!shop || !code || !state || !hmac) {
          throw new Error('Missing required OAuth parameters');
        }

        // Get Supabase client details - hardcoded for static HTML
        const supabaseUrl = 'https://iipaykvimkbbnoobtpzz.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlpcGF5a3ZpbWtiYm5vb2J0cHp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDIxNjU4MTgsImV4cCI6MjA1Nzc0MTgxOH0.qjJd6vbFZMHiTR7IA8IGtVxAzFuPbR5YHcAtLTSlUlA';

        if (!supabaseUrl || !supabaseAnonKey) {
          throw new Error('Supabase configuration missing');
        }

        debugLog('Calling Shopify proxy edge function...');

        const response = await fetch(`${supabaseUrl}/functions/v1/shopify-proxy`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': supabaseAnonKey
          },
          body: JSON.stringify({
            action: 'complete-oauth',
            shop,
            code,
            state,
            hmac
          })
        });

        debugLog(`Edge function response: ${response.status} ${response.statusText}`);

        if (!response.ok) {
          let errorMessage = `OAuth completion failed: ${response.status} ${response.statusText}`;
          let errorDetails = '';
          try {
            const error = await response.json();
            debugLog('Error response: ' + JSON.stringify(error), true);
            errorMessage = error.error || error.message || errorMessage;
            errorDetails = JSON.stringify(error, null, 2);
          } catch (e) {
            const errorText = await response.text();
            debugLog('Error text: ' + errorText, true);
            if (errorText) {
              errorMessage = errorText;
              errorDetails = errorText;
            }
          }
          const fullError = new Error(errorMessage);
          fullError.details = errorDetails;
          throw fullError;
        }

        const result = await response.json();
        debugLog('✓ OAuth completed successfully!');
        debugLog('Result: ' + JSON.stringify(result));

        // Show success state
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('success-state').style.display = 'block';

        // Clear localStorage
        localStorage.removeItem('shopify_state');
        localStorage.removeItem('shopify_shop');

        // Notify parent window
        if (window.opener && !window.opener.closed) {
          debugLog('✓ Parent window detected - sending messages...');

          const successMessage = {
            type: 'shopify:success',
            shop: shop,
            data: result,
            timestamp: Date.now()
          };

          // Send immediately
          window.opener.postMessage(successMessage, '*');
          debugLog('✓ postMessage #1 sent');

          // Send again after 100ms
          setTimeout(() => {
            if (window.opener && !window.opener.closed) {
              window.opener.postMessage(successMessage, '*');
              debugLog('✓ postMessage #2 sent');
            }
          }, 100);

          // Send again after 300ms
          setTimeout(() => {
            if (window.opener && !window.opener.closed) {
              window.opener.postMessage(successMessage, '*');
              debugLog('✓ postMessage #3 sent');
            }
          }, 300);

          // Also set localStorage as fallback
          localStorage.setItem('shopify_oauth_success', JSON.stringify({
            shop: shop,
            timestamp: Date.now()
          }));
          debugLog('✓ localStorage flag set');
        } else {
          debugLog('✗ NO PARENT WINDOW FOUND!', true);
        }

        // Close window after 1 second
        debugLog('Closing window in 1 second...');
        setTimeout(() => {
          debugLog('Attempting to close window now...');
          try {
            window.close();
            debugLog('✓ window.close() called');
          } catch (e) {
            debugLog('✗ Error closing window: ' + e.message, true);
          }
        }, 1000);

      } catch (error) {
        debugLog('✗✗✗ ERROR OCCURRED ✗✗✗', true);
        debugLog('Error: ' + error.message, true);
        debugLog('Stack: ' + error.stack, true);

        // Show error state
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('error-state').style.display = 'block';
        document.getElementById('error-text').textContent = error.message || 'Failed to connect to Shopify';

        const errorDetails = document.getElementById('error-details');
        errorDetails.textContent = error.details || error.stack || error.toString();
        errorDetails.style.display = 'block';

        // Clear localStorage
        localStorage.removeItem('shopify_state');
        localStorage.removeItem('shopify_shop');

        // Notify parent window of error
        if (window.opener && !window.opener.closed) {
          console.log('[Shopify Callback] Sending error message to parent window');

          const errorMessage = {
            type: 'shopify:error',
            error: error.message || 'Failed to connect to Shopify',
            timestamp: Date.now()
          };

          // Send immediately
          window.opener.postMessage(errorMessage, '*');
          console.log('[Shopify Callback] Error message sent #1');

          // Send again after 100ms to ensure delivery
          setTimeout(() => {
            if (window.opener && !window.opener.closed) {
              window.opener.postMessage(errorMessage, '*');
              console.log('[Shopify Callback] Error message sent #2');
            }
          }, 100);

          // Also set localStorage error as fallback
          localStorage.setItem('shopify_oauth_error', JSON.stringify({
            error: error.message,
            timestamp: Date.now()
          }));
          console.log('[Shopify Callback] Set localStorage error flag');
        } else {
          console.warn('[Shopify Callback] No parent window available to send error');
        }

        // Close window after delay
        setTimeout(() => {
          console.log('[Shopify Callback] Closing popup window after error');
          window.close();
        }, 5000);
      }
    }

    // Run when page loads
    handleCallback();
  </script>
</body>
</html>
