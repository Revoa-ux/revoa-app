<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecting to Shopify...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 48px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 500px;
      width: 100%;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #f3f4f6;
      border-top: 4px solid #E11D48;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .success-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #E11D48 40%, #EC4899 80%, #E8795A 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
    }

    .error-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: #ef4444;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 12px;
    }

    p {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.6;
    }

    .error-message {
      background: #fee2e2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 12px;
      margin-top: 16px;
      color: #991b1b;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading-state">
      <div class="spinner"></div>
      <h1>Connecting to Shopify</h1>
      <p>Please wait while we complete the setup...</p>
    </div>

    <div id="success-state" style="display: none;">
      <div class="success-icon">✓</div>
      <h1>Installation Complete!</h1>
      <p>Your Shopify store has been connected successfully.</p>
    </div>

    <div id="error-state" style="display: none;">
      <div class="error-icon">✕</div>
      <h1>Connection Failed</h1>
      <p id="error-text">Something went wrong. Please try again.</p>
      <div id="error-details" class="error-message" style="display: none;"></div>
    </div>
  </div>

  <script type="module">
    async function handleCallback() {
      try {
        const params = new URLSearchParams(window.location.search);
        const shop = params.get('shop');
        const code = params.get('code');
        const state = params.get('state');
        const hmac = params.get('hmac');

        console.log('OAuth callback received:', { shop, code: code ? 'present' : 'missing', state, hmac: hmac ? 'present' : 'missing' });

        // Check if we have required parameters
        if (!shop || !code || !state || !hmac) {
          throw new Error('Missing required OAuth parameters');
        }

        // Get stored state and shop from localStorage (parent window's localStorage)
        const storedState = localStorage.getItem('shopify_state');
        const storedShop = localStorage.getItem('shopify_shop');

        console.log('Stored values:', { storedState, storedShop });

        // Verify state parameter
        if (!storedState || state !== storedState) {
          throw new Error('Invalid state parameter - security check failed');
        }

        if (!storedShop || shop !== storedShop) {
          throw new Error('Shop mismatch - security check failed');
        }

        // Get Supabase client details - hardcoded for static HTML
        const supabaseUrl = 'https://iipaykvimkbbnoobtpzz.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlpcGF5a3ZpbWtiYm5vb2J0cHp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDIxNjU4MTgsImV4cCI6MjA1Nzc0MTgxOH0.qjJd6vbFZMHiTR7IA8IGtVxAzFuPbR5YHcAtLTSlUlA';

        if (!supabaseUrl || !supabaseAnonKey) {
          throw new Error('Supabase configuration missing');
        }

        // Get the session token from localStorage
        const authData = localStorage.getItem('sb-' + supabaseUrl.split('//')[1].split('.')[0] + '-auth-token');
        if (!authData) {
          throw new Error('Authentication required - please sign in');
        }

        const { access_token } = JSON.parse(authData);

        // Call our edge function to handle the OAuth completion
        const response = await fetch(`${supabaseUrl}/functions/v1/shopify-proxy`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${access_token}`,
            'apikey': supabaseAnonKey
          },
          body: JSON.stringify({
            action: 'complete-oauth',
            shop,
            code,
            state,
            hmac
          })
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.message || `OAuth completion failed: ${response.statusText}`);
        }

        const result = await response.json();
        console.log('OAuth completed successfully:', result);

        // Show success state
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('success-state').style.display = 'block';

        // Clear localStorage
        localStorage.removeItem('shopify_state');
        localStorage.removeItem('shopify_shop');

        // Notify parent window
        if (window.opener && !window.opener.closed) {
          console.log('Sending success message to parent window');
          window.opener.postMessage({
            type: 'shopify:success',
            shop: shop,
            data: result
          }, '*');

          // Also try to trigger a storage event as fallback
          localStorage.setItem('shopify_oauth_success', JSON.stringify({
            shop: shop,
            timestamp: Date.now()
          }));
        }

        // Close window after delay
        setTimeout(() => {
          window.close();
        }, 1500);

      } catch (error) {
        console.error('OAuth callback error:', error);

        // Show error state
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('error-state').style.display = 'block';
        document.getElementById('error-text').textContent = error.message || 'Failed to connect to Shopify';

        const errorDetails = document.getElementById('error-details');
        errorDetails.textContent = error.stack || error.toString();
        errorDetails.style.display = 'block';

        // Clear localStorage
        localStorage.removeItem('shopify_state');
        localStorage.removeItem('shopify_shop');

        // Notify parent window of error
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage({
            type: 'shopify:error',
            error: error.message || 'Failed to connect to Shopify'
          }, '*');

          // Also set localStorage error as fallback
          localStorage.setItem('shopify_oauth_error', JSON.stringify({
            error: error.message,
            timestamp: Date.now()
          }));
        }

        // Close window after delay
        setTimeout(() => {
          window.close();
        }, 5000);
      }
    }

    // Run when page loads
    handleCallback();
  </script>
</body>
</html>
