# Configuration for Shopify CLI 3.0+
name = "Revoa"
client_id = "21f747d6719351a523236f5481e5a60c"
application_url = "https://members.revoa.app"
embedded = false

[access_scopes]
# Core scopes for profit tracking and analytics
# 1. read_products - View product catalog and pricing
# 2. read_orders - Access order data for profit calculations (including historical data for YoY analytics)
# 3. read_inventory - Track inventory levels
# 4. read_fulfillments - Monitor order fulfillment status
# 5. read_returns - Track returns for accurate net revenue calculations
# 6. read_reports - Access sales reports and analytics
scopes = "read_products,read_orders,read_inventory,read_fulfillments,read_returns,read_reports"


[auth]
redirect_urls = [
  "https://members.revoa.app/shopify-callback",
  "http://localhost:5173/shopify-callback"
]

[webhooks]
api_version = "2025-01"
compliance_url = "https://api.revoa.app/webhooks/shopify"

[pos]
embedded = false

[build]
automatically_update_urls_on_dev = true
dev_store_url = "revoatest.myshopify.com"

[extension_directories]
extensions = "extensions/*"