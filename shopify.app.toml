# Configuration for Shopify CLI 3.0+
name = "Revoa"
client_id = "21f747d6719351a523236f5481e5a60c"
application_url = "https://members.revoa.app"
embedded = false

[access_scopes]
# Core scopes for profit tracking and analytics
# 1. read_all_orders - Access ALL order data including protected customer data
# 2. read_fulfillments - Monitor order fulfillment status
# 3. read_inventory - Track inventory levels
# 4. read_orders - Access order data for profit calculations
# 5. read_products - View product catalog and pricing
# 6. write_products - Create and update products
# 7. read_returns - Track returns for accurate net revenue calculations
scopes = "read_all_orders,read_fulfillments,read_inventory,read_orders,read_products,write_products,read_returns"


[auth]
redirect_urls = [
  "https://members.revoa.app/shopify-callback",
  "http://localhost:5173/shopify-callback"
]

[webhooks]
api_version = "2025-01"
compliance_url = "https://api.revoa.app/webhooks/shopify"

[pos]
embedded = false

[build]
automatically_update_urls_on_dev = true
dev_store_url = "revoatest.myshopify.com"

[extension_directories]
extensions = "extensions/*"